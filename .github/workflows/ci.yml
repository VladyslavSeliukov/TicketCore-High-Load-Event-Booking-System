name: TicketCore CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ticketcore_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: "test"
      SECRET_KEY: "test_secret_key_for_ci_environment"
      TARGET_EVENT_ID: "1"
      AVAILABLE_TICKET_TYPES: "1,2"

      PROJECT_NAME: "TicketCore CI"
      PROJECT_VERSION: "1.0.0"
      API_V1_STR: "/api/v1"
      LOG_LEVEL: "INFO"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      DEFAULT_PAGE_LIMIT: "100"
      REDIS_TTL_SECONDS: "10"
      TICKET_RESERVATION_TIME_SECONDS: "900"

      POSTGRES_USER: "ci_user"
      POSTGRES_PASSWORD: "ci_password"
      POSTGRES_DB: "ticketcore_test_db"
      POSTGRES_HOST: "localhost"
      POSTGRES_PORT: "5432"
      REDIS_HOST: "localhost"
      REDIS_PORT: "6379"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv and setup Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run Pytest
        run: uv run pytest -v