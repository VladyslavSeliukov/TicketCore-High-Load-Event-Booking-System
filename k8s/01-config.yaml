apiVersion: v1
kind: ConfigMap
metadata:
  name: ticketcore-config
  namespace: default
data:
  PROJECT_NAME: "TicketCore"
  PROJECT_VERSION: "1.0.0"
  API_V1_STR: "/api/v1"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  DEFAULT_PAGE_LIMIT: "100"
  TICKET_RESERVATION_TIME_SECONDS: "900"
  POSTGRES_HOST: "postgres-svc"
  POSTGRES_PORT: "5432"
  REDIS_HOST: "redis-svc"
  REDIS_PORT: "6379"
  REDIS_TTL_SECONDS: "10"