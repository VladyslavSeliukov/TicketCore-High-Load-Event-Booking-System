apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
data:
  alertmanager.yml: |-
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      receiver: 'telegram_bot'

    receivers:
      - name: 'telegram_bot'
        telegram_configs:
          - bot_token_file: '/etc/alertmanager/secrets/telegram_bot_token'
            chat_id: 557504873
            parse_mode: 'HTML'
            message: |-
              {{ range .Alerts }}
              <b>🚨 {{ .Annotations.summary }}</b>
              <b>Severity:</b> {{ .Labels.severity }}
              <b>Details:</b> {{ .Annotations.description }}
              {{ end }}