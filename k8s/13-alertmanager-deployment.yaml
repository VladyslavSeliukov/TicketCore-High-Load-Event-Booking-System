apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - "--config.file=/etc/alertmanager/config/alertmanager.yml"
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config-volume
              mountPath: /etc/alertmanager/config
              readOnly: true
            - name: secret-volume
              mountPath: /etc/alertmanager/secrets
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: alertmanager-config
        - name: secret-volume
          secret:
            secretName: ticketcore-secrets
            items:
              - key: TELEGRAM_BOT_TOKEN
                path: telegram_bot_token
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
spec:
  selector:
    app: alertmanager
  ports:
    - protocol: TCP
      port: 9093
      targetPort: 9093