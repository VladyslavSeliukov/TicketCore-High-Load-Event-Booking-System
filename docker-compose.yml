version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
x-deploy: &default-deploying
  resources:
    limits:
      cpus: '1'
      memory: 512M

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend_network
    logging: *default-logging
    deploy: *default-deploying

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend_network
    logging: *default-logging
    deploy: *default-deploying
  backend:
    build: .
    restart: unless-stopped
    expose:
      - '8000'
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      backend_network:
        aliases:
          - api
    logging: *default-logging

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - backend_network
    logging: *default-logging
    deploy: *default-deploying

volumes:
  postgres_data:

networks:
  backend_network: