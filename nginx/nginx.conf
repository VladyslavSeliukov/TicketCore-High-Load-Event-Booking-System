events {
    worker_connections 4096;

    multi_accept on;
}

http {
    upstream api {
        server backend:8000;
        keepalive 100;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_buffers 8 16k;
            proxy_buffer_size 32k;
        }
    }
}